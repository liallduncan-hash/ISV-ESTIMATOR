function calcM2(type,dims){
const n=k=>parseFloat(dims[k])||0;
switch(type){
case"SHS":return 4*(n("size")/1000)*n("lm");
case"RHS":return 2*((n("w")+n("h"))/1000)*n("lm");
case"CHS":return Math.PI*(n("dia")/1000)*n("lm");
case"UC":return(n("size")/1000)*6*n("lm");
case"UB":return(UB_TABLE[dims.designation]||0)*n("lm");
case"PFC":return((n("d")+4*n("bf"))/1000)*n("lm");
case"PL":return 2*(n("w")/1000)*n("lm");
case"FL":return 2*(n("w")/1000)*n("lm");
case"ANGLE":return 2*((n("a")+n("b"))/1000)*n("lm");
case"ROD":return Math.PI*(n("dia")/1000)*n("lm");
case"TANK":{const a=n("l"),b=n("w"),c=n("h");return 2*(a*b)+2*(a*c)+2*(b*c);}
case"FLAT":return n("area");
case"CUSTOM_CIRC":return n("circ")*n("lm");
default:return 0;
}}

function evalCustomFormula(formula,inputs){
try{const vars=Object.entries(inputs).map(([k,v])=>"const "+k+"="+(parseFloat(v)||0)+";").join("");return new Function(vars+" return "+formula+";")();}catch(e){return 0;}}

function calcLitres(areaSqM,dftMicrons,volumeSolids,wasteFactor){
const wf=wasteFactor===undefined?15:wasteFactor;
const theoretical=(areaSqM*dftMicrons)/(10*volumeSolids);
return{theoretical,practical:theoretical*(1+wf/100)};}

function mapSectionType(desc){
const d=desc.toUpperCase().trim();
if(d.startsWith("SHS"))return"SHS";if(d.startsWith("RHS"))return"RHS";
if(d.startsWith("CHS")||d.includes("PIPE")||d.includes("NB"))return"CHS";
if(d.startsWith("UC"))return"UC";if(d.startsWith("UB"))return"UB";
if(d.startsWith("PFC")||d.startsWith("TFC")||d.includes("CHANNEL")||d.endsWith("PFC")||d.includes(" PFC"))return"PFC";
if(d.startsWith("EA ")||d.startsWith("EA\t")||d.endsWith(" EA")||d.endsWith("EA")||d.match(/^\d+.*EA$/))return"ANGLE";
if(d.startsWith("UA ")||d.startsWith("UA\t"))return"ANGLE";if(d.startsWith("ANGLE"))return"ANGLE";
if(d.startsWith("FLAT")||d.startsWith("FL ")||d.startsWith("FL\t"))return"FL";
if(d.startsWith("PL")||d.startsWith("PLATE"))return"PL";if(d.startsWith("ROD")||d.startsWith("RD"))return"ROD";
return"CUSTOM_CIRC";}

function parseSectionDims(type,desc){
const nums=desc.match(/[\d.]+/g)||[];
switch(type){
case"SHS":return{size:nums[0]||""};case"RHS":return{w:nums[0]||"",h:nums[1]||""};
case"CHS":return{dia:nums[0]||""};case"UC":return{size:nums[0]||""};
case"PFC":return{d:nums[0]||"",bf:nums[1]||""};
case"ANGLE":return{a:nums[0]||"",b:nums[1]||nums[0]||""};
case"FL":case"PL":return{w:nums[0]||""};case"ROD":return{dia:nums[0]||""};
default:return{};}}

function memberM2(m){
const u=m.type==="CUSTOM_SHAPE"?evalCustomFormula(m.customShape?m.customShape.formula:"",m.dims):calcM2(m.type,m.dims);
return u*(parseFloat(m.qty)||1);}
